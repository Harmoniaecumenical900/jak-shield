<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="780" height="220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1116"/>
      <stop offset="0.5" stop-color="#11161D"/>
      <stop offset="1" stop-color="#0B0F14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.5" stop-color="#A371F7"/>
      <stop offset="1" stop-color="#F778BA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="780" height="220" rx="14" fill="url(#bg)"/>
  <g transform="translate(40, 50)">
    <!-- Shield icon -->
    <path d="M 60 0 L 110 18 L 110 70 Q 110 110 60 130 Q 10 110 10 70 L 10 18 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
    <path d="M 35 65 L 55 85 L 90 45" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(180, 70)" fill="#E6EDF3" font-family="ui-sans-serif,system-ui,'Segoe UI',Helvetica,Arial" font-weight="700">
    <text x="0" y="0" font-size="44" letter-spacing="-1">JAK Shield</text>
    <text x="0" y="34" font-size="16" font-weight="400" fill="#8B949E">Universal security gateway for AI agents · MCP-native</text>
    <text x="0" y="74" font-size="13" font-weight="500" fill="#58A6FF">block · redact · approve · audit — before the agent touches the real world</text>
  </g>
  <g transform="translate(40, 190)" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="11" fill="#6E7681">
    <text>$ pnpm install &amp;&amp; pnpm build &amp;&amp; node scripts/install-claude-desktop-mcp.mjs</text>
  </g>
</svg>
