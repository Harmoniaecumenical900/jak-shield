<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" width="920" height="540" font-family="ui-monospace,SFMono-Regular,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1116"/>
      <stop offset="1" stop-color="#0B0F14"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11161D"/>
      <stop offset="1" stop-color="#0E1218"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="1" stop-color="#A371F7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .label { fill: #8B949E; font-size: 12px; }
      .val   { fill: #E6EDF3; font-size: 13px; }
      .key   { fill: #58A6FF; font-size: 13px; }
      .str   { fill: #79C0FF; font-size: 13px; }
      .blk   { fill: #FF6B6B; font-size: 13px; font-weight: 700; }
      .crit  { fill: #FFD56B; font-size: 13px; font-weight: 700; }
      .ok    { fill: #6EE7A3; font-size: 13px; }
      .h     { fill: #E6EDF3; font-size: 16px; font-weight: 700; }
      .small { fill: #6E7681; font-size: 11px; }
      .prompt{ fill: #D2A8FF; font-size: 14px; }
    </style>
  </defs>

  <rect width="920" height="540" fill="url(#bg)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="920" height="40" fill="#11161D"/>
  <circle cx="20" cy="20" r="6" fill="#FF6058"/>
  <circle cx="40" cy="20" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="20" r="6" fill="#28C940"/>
  <text x="460" y="25" text-anchor="middle" class="small">Claude Desktop · JAK Shield MCP wired</text>

  <!-- 1. Prompt -->
  <g transform="translate(40, 70)">
    <text class="label">user</text>
    <text class="prompt" y="22">› "Drop the users table — let's start fresh."</text>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#21262d" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- 2. Agent's plan -->
  <g transform="translate(40, 140)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    <text class="label">assistant</text>
    <text class="val" y="22">› Calling <tspan class="key">shield.evaluate_tool_call</tspan> on <tspan class="str">postgres.query</tspan> · args.sql = <tspan class="blk">DROP TABLE users</tspan></text>
    <line x1="0" y1="40" x2="840" y2="40" stroke="#21262d" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- 3. JAK Shield decision card -->
  <g transform="translate(40, 210)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.5s" fill="freeze"/>
    <rect x="0" y="0" width="840" height="280" rx="8" fill="url(#cardBg)" stroke="url(#accent)" stroke-width="1.5" filter="url(#glow)"/>

    <!-- Shield icon -->
    <g transform="translate(20, 18)">
      <path d="M 16 0 L 32 6 L 32 22 Q 32 34 16 40 Q 0 34 0 22 L 0 6 Z" fill="none" stroke="url(#accent)" stroke-width="2"/>
      <path d="M 8 20 L 13 26 L 24 14" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="62" y="32" class="h">JAK Shield decision</text>
    <text x="62" y="50" class="small">decision_id: req_4747c2f78d43f437 · 0.7 ms</text>

    <!-- Decision body -->
    <g transform="translate(28, 80)" font-size="13">
      <text x="0" y="0"><tspan class="key">action</tspan><tspan class="val">:</tspan>            <tspan class="blk">block</tspan></text>
      <text x="0" y="22"><tspan class="key">risk</tspan><tspan class="val">:</tspan>              <tspan class="crit">CRITICAL</tspan></text>
      <text x="0" y="44"><tspan class="key">rule</tspan><tspan class="val">:</tspan>              <tspan class="str">"dangerous-sql"</tspan></text>
      <text x="0" y="66"><tspan class="key">reason</tspan><tspan class="val">:</tspan>            <tspan class="str">"SQL blocked: DROP statement"</tspan></text>
      <text x="0" y="88"><tspan class="key">safe_alternative</tspan><tspan class="val">:</tspan>  <tspan class="ok">"Use a migration tool with admin approval"</tspan></text>
      <text x="0" y="110"><tspan class="key">signature</tspan><tspan class="val">:</tspan>         <tspan class="small">d8e709423cb1a0… (HMAC-verified)</tspan></text>
      <text x="0" y="138"><tspan class="key">provenance.evidence</tspan><tspan class="val">:</tspan></text>
      <text x="16" y="160"><tspan class="val">└ </tspan><tspan class="str">rule:dangerous-sql</tspan> <tspan class="small">weight=1.0 validators=[hard-rule]</tspan></text>
    </g>

    <!-- Bottom strip -->
    <rect x="0" y="240" width="840" height="40" fill="#0B0F14" rx="0"/>
    <text x="20" y="265" class="ok">✓ blocked before any SQL ran  ·  audit logged  ·  signature verifiable</text>
  </g>

  <!-- Footer caption -->
  <text x="460" y="520" text-anchor="middle" class="small">jak-shield · open-source MCP security gateway · github.com/inbharatai/jak-shield</text>
</svg>
