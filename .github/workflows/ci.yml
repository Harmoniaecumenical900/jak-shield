name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate Prisma client
        run: pnpm --filter @jak-shield/approval-gateway prisma generate

      - name: Typecheck + build
        run: pnpm build

      - name: Run security test suite
        run: pnpm --filter @jak-shield/tests test

      - name: Run unit tests in workspaces
        run: pnpm -r --filter '!@jak-shield/dashboard' test || true

      - name: Run adversarial benchmark
        run: pnpm bench

      - name: Run performance benchmark
        run: node bench/perf-bench.mjs

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/results.json
          if-no-files-found: ignore
