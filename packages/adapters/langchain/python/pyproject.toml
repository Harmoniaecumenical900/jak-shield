[project]
name = "jak-shield-langchain"
version = "0.3.0"
description = "JAK Shield adapter for LangChain — gate any LangChain agent's tool calls through JAK Shield's policy engine"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "JAK Shield", email = "info@inbharat.ai" }]
keywords = ["langchain", "mcp", "ai-safety", "prompt-injection", "agent-security", "jak-shield"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]

dependencies = [
    "langchain-core>=0.3.0",
    "pydantic>=2.5.0",
    "httpx>=0.27.0",
]

[project.urls]
Homepage = "https://github.com/inbharatai/jak-shield"
Issues = "https://github.com/inbharatai/jak-shield/issues"
Documentation = "https://github.com/inbharatai/jak-shield/tree/main/packages/adapters/langchain"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["jak_shield_langchain"]
