version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jak-shield-postgres
    environment:
      POSTGRES_USER: jakshield
      POSTGRES_PASSWORD: jakshield
      POSTGRES_DB: jak_shield
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: jak-shield-api
    environment:
      DATABASE_URL: postgresql://jakshield:jakshield@postgres:5432/jak_shield
      SHIELD_API_PORT: 4100
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      JAK_SHIELD_FIELD_KEY: ${JAK_SHIELD_FIELD_KEY:-}
    ports:
      - '4100:4100'
    depends_on:
      - postgres

  mcp-http:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: jak-shield-mcp-http
    environment:
      DATABASE_URL: postgresql://jakshield:jakshield@postgres:5432/jak_shield
      SHIELD_MCP_HTTP_PORT: 4101
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      JAK_SHIELD_FIELD_KEY: ${JAK_SHIELD_FIELD_KEY:-}
    ports:
      - '4101:4101'
    depends_on:
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: jak-shield-dashboard
    environment:
      NEXT_PUBLIC_SHIELD_API: http://localhost:4100
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres-data:
